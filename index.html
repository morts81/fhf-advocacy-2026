<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advocacy Meeting Simulation — The Fred Hollows Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #F2F2F2; font-family: 'Noto Sans', 'Segoe UI', sans-serif; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    @keyframes blink { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ─── System prompt ───────────────────────────────────────────────────────
    const SYSTEM_PROMPT = `You are playing the role of a Ministry of Health (MoH) representative meeting with an advocate from The Fred Hollows Foundation, an international NGO focused on eye health. The advocate has requested a meeting to present a proposal and make a request of your ministry.

Your role title is: Ministry of Health Representative. Do not use a personal name. This simulation will be used across multiple country contexts, so keep your character culturally neutral — professional, senior, and time-pressured, but not tied to any specific national political system or health system.

What you know going into the meeting:
You know a little about The Fred Hollows Foundation and eye health, but not a lot. Your mandate and responsibilities are broader than just eye health — you oversee a wide range of health priorities. You have agreed to this meeting as a courtesy and out of general interest, but you have no prior commitment to anything.

Your current work priorities:
- Improving quality of health services
- Increasing equity in access to health services
- Both sit within your government's agenda to achieve universal health coverage (UHC)
- You have a limited and already-committed budget — you are particularly interested in initiatives that increase efficiency and save money, or that can demonstrate a clear return on investment

What you respond well to:
- Advocates who are clear, direct, and specific about what they are asking
- Evidence of need — how large is this problem, who does it affect?
- Evidence that an initiative works — what is the proof?
- Demonstrations that an initiative is cost-effective or saves money downstream
- Organisations that bring resources, expertise, or implementation capacity — not just asks
- Links to your existing priorities around UHC, quality, and equity

Questions you will raise during the meeting — work these in naturally, don't ask them all at once:
- How is this relevant to my current work priorities?
- How significant is the need — how many people are affected?
- Where would the funding come from? How does this fit within our budget constraints?
- What are public perceptions of this issue?
- What is the likely return on investment?
- What is the evidence that this approach works?
- What support and resources can The Fred Hollows Foundation bring to help make this feasible to implement?

Hidden complexity — only reveal if the advocate earns it through strong expertise or good questions:
- Your ministry has been quietly considering a broader eye health strategy but lacks the technical expertise and implementation capacity to move it forward — a credible partner with a concrete proposal could be very well timed
- There is a planning cycle coming up where a targeted budget line could be created if a compelling case is made quickly
- A previous NGO approached you on a similar issue but couldn't demonstrate cost-effectiveness — you are carrying some residual caution about whether these proposals are realistic

Behavioural rules:
- Stay in character throughout. Never break character. Never offer coaching or hints during the meeting.
- Open the meeting professionally but slightly distracted — you have come from back-to-back meetings
- If the advocate is vague, cannot answer your questions, or has no clear ask: become more closed — give shorter answers, check the time, signal you are wrapping up
- If the advocate is specific, evidence-led, and links their proposal to your priorities (UHC, equity, efficiency, cost-effectiveness): gradually open up, ask follow-up questions, show genuine interest
- If they deliver a strong close with a concrete ask: offer a meaningful next step — for example, requesting a written brief, agreeing to a follow-up meeting, or offering to connect them with a relevant working group
- If the advocate ignores your questions, uses unexplained technical jargon, or is pushy: become noticeably less engaged
- Respond in 2–4 sentences. You are busy. Do not volunteer information — wait to be asked or prompted.
- Do not tell the advocate what they should have said or done at any point during the meeting

Your opening line:
"Thank you for coming in. I have to be honest — my afternoon has been quite full. But I'm glad we could find the time. Please, tell me what brings you here today."

Ending the meeting:
End the meeting when:
- The advocate signals they are wrapping up
- You have given a meaningful commitment or a clear brush-off and the conversation has naturally concluded
- Approximately 10–12 exchanges have passed — at that point, close naturally: "I appreciate you coming in — I'm afraid I have another commitment now, but let's see where we've landed."

When the meeting ends, output the following exact tag on its own line so the app can detect it and trigger the debrief screen:
[MEETING_ENDED]

Then immediately provide the debrief using the structure below.

Your assessment must be honest and direct. Do not soften or inflate your judgement to make the advocate feel good — that undermines the purpose of the exercise. If the pitch was weak, say so clearly. If the advocate failed to answer a question, missed an obvious opportunity, or made a vague or unconvincing ask, name it plainly. Praise should be specific and earned, not offered as reassurance.

Write in the second person — address the learner directly as "you" and "your", not as "the advocate". Do not use markdown formatting such as bold or italics — plain text only.

Use the following criteria to guide your assessment. You do not need to address every criterion explicitly — use them to inform your judgement about what worked and what did not:
- Did they clearly establish their expertise and credibility to speak on this issue?
- Was their message clear and easy to understand?
- Did they clearly outline what the problem is?
- Did they clearly outline a proposed solution and explain why it will work?
- Did they make a clear and specific ask to this decision maker?
- Did they use evidence, human stories, or real-world examples to show how it could work in practice?
- How well did they address what the MoH representative said matters to them?
- How well did they respond to the MoH representative's questions?
- Did they secure clear next steps or commitments from the MoH representative?

OVERALL_IMPRESSION: [One honest sentence — name the single most important thing that made the pitch land or fall short]

WORKED_WELL:
- [One specific strength, grounded in something the advocate actually said or did — maximum 2 points total]
- [Second strength if genuinely warranted]

COULD_BE_STRONGER:
- [One specific gap, named plainly — reference what was actually said or missed]
- [Second gap]
- [Third gap if warranted]

ONE_THING: [The single most important thing to do differently next time — concrete and actionable]`;

    // ─── Design tokens ────────────────────────────────────────────────────────
    const ORANGE      = "#EA7600";
    const ORANGE_PALE = "#FEF3E6";
    const ORANGE_DARK = "#B85D00";
    const SAGE        = "#A5C8BE";
    const SAGE_DARK   = "#4E8C80";
    const SAGE_PALE   = "#EBF5F3";
    const CHARCOAL    = "#282828";
    const CHARCOAL_60 = "#717171";
    const CHARCOAL_10 = "#F2F2F2";
    const WHITE       = "#FFFFFF";
    const BORDER      = "rgba(40,40,40,0.13)";
    const BORDER_MED  = "rgba(40,40,40,0.24)";
    const SUCCESS     = "#2E7D5E";
    const WARN        = ORANGE_DARK;
    const FONT        = "'Noto Sans', 'Segoe UI', sans-serif";

    // ─── Shared styles ────────────────────────────────────────────────────────
    const pageWrap      = { minHeight: "100vh", background: CHARCOAL_10, fontFamily: FONT, padding: "2rem 1rem", boxSizing: "border-box" };
    const cardWrap      = { maxWidth: 700, margin: "0 auto", background: WHITE, borderRadius: 14, border: `1px solid ${BORDER}`, overflow: "hidden" };
    const cardHdr       = { background: CHARCOAL, padding: "1.25rem 2rem", display: "flex", alignItems: "center", gap: 14 };
    const cardBody      = { padding: "2rem" };
    const btnPrimary    = { fontFamily: FONT, background: ORANGE, color: WHITE, border: "none", borderRadius: 8, padding: "0.7rem 1.5rem", fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 };
    const btnDisabled   = { ...btnPrimary, background: CHARCOAL_10, color: CHARCOAL_60, border: `1px solid ${BORDER}`, cursor: "not-allowed" };
    const btnOutlineSage = { fontFamily: FONT, background: "transparent", color: SAGE, border: `1.5px solid ${SAGE}`, borderRadius: 8, padding: "0.45rem 1.1rem", fontSize: 14, fontWeight: 600, cursor: "pointer" };

    // ─── Debrief parser ───────────────────────────────────────────────────────
    function parseDebrief(text) {
      const sections = {};
      let currentKey = null;
      const cleaned = text.replace(/\*\*/g, "");

      for (const line of cleaned.split("\n")) {
        const keyMatch = line.match(/^([A-Za-z_]+):\s*(.*)/);
        if (keyMatch) {
          currentKey = keyMatch[1].toUpperCase();
          sections[currentKey] = keyMatch[2] ? [keyMatch[2]] : [];
        } else if (currentKey) {
          sections[currentKey].push(line);
        }
      }

      const getString = (key) => (sections[key] || []).join(" ").trim();
      const getList = (key, max) => {
        const items = (sections[key] || [])
          .filter(l => l.trim().match(/^[-•*]/))
          .map(l => l.replace(/^[-•*]\s*/, "").trim())
          .filter(Boolean);
        return max ? items.slice(0, max) : items;
      };

      return {
        overall:         getString("OVERALL_IMPRESSION"),
        workedWell:      getList("WORKED_WELL", 2),
        couldBeStronger: getList("COULD_BE_STRONGER", 3),
        oneThing:        getString("ONE_THING"),
        _raw:            text,
      };
    }

    // ─── Render MoH message: stage directions on their own line ───────────────
    function renderMohMessage(text) {
      return text.split(/(\*[^*]+\*)/g).map((part, i) => {
        if (part.startsWith("*") && part.endsWith("*")) {
          return (
            <span key={i} style={{ display: "block", fontStyle: "italic", color: CHARCOAL_60, fontSize: 15, marginBottom: 4 }}>
              {part.slice(1, -1)}
            </span>
          );
        }
        return part ? <span key={i}>{part}</span> : null;
      });
    }

    // ─── Sub-components ───────────────────────────────────────────────────────
    function Avatar({ icon, bg, size = 38 }) {
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <i className={`ti ti-${icon}`} style={{ color: WHITE, fontSize: size * 0.47 }} aria-hidden="true" />
        </div>
      );
    }

    function SectionLabel({ children }) {
      return (
        <p style={{ fontFamily: FONT, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: CHARCOAL_60, margin: "0 0 10px" }}>
          {children}
        </p>
      );
    }

    function Divider() {
      return <hr style={{ border: "none", borderTop: `1px solid ${BORDER}`, margin: "1.5rem 0" }} />;
    }

    // ─── Main app ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen]               = useState("briefing");
      const [checked, setChecked]             = useState(false);
      const [messages, setMessages]           = useState([]);
      const [input, setInput]                 = useState("");
      const [loading, setLoading]             = useState(false);
      const [transitioning, setTransitioning] = useState(false);
      const [exchangeCount, setExchangeCount] = useState(0);
      const [debrief, setDebrief]             = useState(null);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      async function apiCall(msgs, maxTokens = 1000) {
        const res = await fetch("/api/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, system: SYSTEM_PROMPT, messages: msgs }),
        });
        const data = await res.json();
        return data.content?.find(b => b.type === "text")?.text || "";
      }

      function finaliseMeeting(text) {
        const [before, after] = text.split("[MEETING_ENDED]");
        if (before.trim()) setMessages(prev => [...prev, { role: "assistant", content: before.trim() }]);
        setDebrief(parseDebrief(after?.trim() || ""));
        setLoading(false);
        setTransitioning(true);
      }

      async function startMeeting() {
        setScreen("meeting");
        setLoading(true);
        try {
          const text = await apiCall([{ role: "user", content: "Please begin the meeting with your opening line." }]);
          setMessages([{ role: "assistant", content: text }]);
        } catch {
          setMessages([{ role: "assistant", content: "Thank you for coming in. I have to be honest — my afternoon has been quite full. But I'm glad we could find the time. Please, tell me what brings you here today." }]);
        }
        setExchangeCount(1);
        setLoading(false);
      }

      async function sendMessage() {
        if (!input.trim() || loading || transitioning) return;
        const userMsg = input.trim();
        setInput("");
        const updated = [...messages, { role: "user", content: userMsg }];
        setMessages(updated);
        setLoading(true);
        const newCount = exchangeCount + 1;
        setExchangeCount(newCount);

        const apiMsgs = [{ role: "user", content: "Please begin the meeting with your opening line." }, ...updated];
        if (newCount >= 10) {
          const last = apiMsgs[apiMsgs.length - 1];
          apiMsgs[apiMsgs.length - 1] = { ...last, content: last.content + " Note: approximately 10–12 exchanges have now passed. If it feels natural, bring the meeting to a close with your wrap-up line, then output [MEETING_ENDED] and the full debrief." };
        }

        try {
          const text = await apiCall(apiMsgs, 2000);
          if (text.includes("[MEETING_ENDED]")) {
            finaliseMeeting(text);
          } else {
            setMessages(prev => [...prev, { role: "assistant", content: text }]);
            setLoading(false);
          }
        } catch {
          setMessages(prev => [...prev, { role: "assistant", content: "I appreciate the point. Could you tell me more?" }]);
          setLoading(false);
        }
      }

      async function endMeeting() {
        if (loading || transitioning) return;
        const updated = [...messages, { role: "user", content: "I think that covers what I wanted to discuss today. Thank you for your time." }];
        setMessages(updated);
        setLoading(true);
        try {
          const text = await apiCall([
            { role: "user", content: "Please begin the meeting with your opening line." },
            ...updated,
            { role: "user", content: "The advocate has signalled they are wrapping up. Please close the meeting naturally, then output [MEETING_ENDED] followed by the full debrief." },
          ], 2000);
          if (text.includes("[MEETING_ENDED]")) {
            finaliseMeeting(text);
          } else {
            setMessages(prev => [...prev, { role: "assistant", content: text }]);
            setLoading(false);
          }
        } catch {
          setLoading(false);
        }
      }

      function reset() {
        setScreen("briefing");
        setChecked(false);
        setMessages([]);
        setInput("");
        setLoading(false);
        setTransitioning(false);
        setExchangeCount(0);
        setDebrief(null);
      }

      // ── Screen 1: Briefing ──────────────────────────────────────────────────
      if (screen === "briefing") return (
        <div style={pageWrap}>
          <h2 className="sr-only">Advocacy Meeting Roleplay — Briefing</h2>
          <div style={cardWrap}>
            <div style={cardHdr}>
              <Avatar icon="building-community" bg={ORANGE} />
              <div>
                <p style={{ fontFamily: FONT, margin: 0, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: SAGE }}>Advocacy Training Simulation</p>
                <p style={{ fontFamily: FONT, margin: "3px 0 0", fontSize: 18, fontWeight: 700, color: WHITE }}>Ministry of Health — Lobby Meeting</p>
              </div>
            </div>
            <div style={cardBody}>
              <SectionLabel>Your situation</SectionLabel>
              <h2 style={{ fontFamily: FONT, fontSize: 22, fontWeight: 700, color: CHARCOAL, margin: "0 0 1rem" }}>Briefing</h2>
              <p style={{ fontFamily: FONT, fontSize: 15, lineHeight: 1.75, color: CHARCOAL, margin: "0 0 0.85rem" }}>
                You are an advocate from <strong>The Fred Hollows Foundation</strong>, an international NGO working to eliminate avoidable blindness and restore sight in communities around the world. You have secured a meeting with a representative from the <strong>Ministry of Health (MoH)</strong>.
              </p>
              <p style={{ fontFamily: FONT, fontSize: 15, lineHeight: 1.75, color: CHARCOAL, margin: "0 0 0.85rem" }}>
                This is your opportunity to make a compelling case for action on eye health. The MoH representative is busy, does not specialise in eye health, and has made no prior commitments. You need to earn their attention and interest.
              </p>

              <Divider />
              <SectionLabel>Your objectives</SectionLabel>
              {[
                ["Establish credibility", "Introduce yourself and The Foundation — demonstrate your experience and authority to speak on eye health."],
                ["Deliver your messages", "Present a clear problem statement, a proposed solution, and evidence that it works."],
                ["Make a specific ask", "State clearly what you are asking the MoH representative to do."],
                ["Secure a next step", "Aim for at least a follow-up meeting or a formal request for more information. If the meeting goes well, push for a point of contact or a government-led working group."],
              ].map(([title, desc], i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                  <div style={{ width: 27, height: 27, borderRadius: "50%", background: ORANGE_PALE, border: `2px solid ${ORANGE}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                    <span style={{ fontFamily: FONT, fontSize: 12, fontWeight: 700, color: ORANGE }}>{i + 1}</span>
                  </div>
                  <div>
                    <p style={{ fontFamily: FONT, margin: 0, fontSize: 14, fontWeight: 700, color: CHARCOAL }}>{title}</p>
                    <p style={{ fontFamily: FONT, margin: "3px 0 0", fontSize: 14, color: CHARCOAL_60, lineHeight: 1.65 }}>{desc}</p>
                  </div>
                </div>
              ))}

              <Divider />
              <div style={{ background: SAGE_PALE, borderLeft: `3px solid ${SAGE_DARK}`, borderRadius: 8, padding: "1rem 1.25rem", marginBottom: "1.5rem" }}>
                <p style={{ fontFamily: FONT, margin: 0, fontSize: 14, color: CHARCOAL, lineHeight: 1.7 }}>
                  <strong>Note:</strong> The MoH representative will respond realistically. They will not volunteer information, and they will disengage if your pitch is vague or unfocused. The quality of your responses determines how the meeting unfolds.
                </p>
              </div>

              <Divider />
              <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: "1.5rem" }}>
                <input type="checkbox" id="ready" checked={checked} onChange={e => setChecked(e.target.checked)}
                  style={{ marginTop: 3, width: 17, height: 17, accentColor: ORANGE, cursor: "pointer", flexShrink: 0 }} />
                <label htmlFor="ready" style={{ fontFamily: FONT, fontSize: 15, color: CHARCOAL, cursor: "pointer", lineHeight: 1.55 }}>
                  I have read the briefing and I am ready to begin
                </label>
              </div>
              <button style={checked ? btnPrimary : btnDisabled} disabled={!checked} onClick={startMeeting}>
                Begin Meeting
              </button>
            </div>
          </div>
        </div>
      );

      // ── Screen 2: Meeting ───────────────────────────────────────────────────
      if (screen === "meeting") return (
        <div style={pageWrap}>
          <h2 className="sr-only">Advocacy Meeting — Chat</h2>
          <div style={{ ...cardWrap, display: "flex", flexDirection: "column", height: "90vh", maxHeight: 820 }}>

            <div style={{ ...cardHdr, flexShrink: 0, justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Avatar icon="user-circle" bg={SAGE_DARK} />
                <div>
                  <p style={{ fontFamily: FONT, margin: 0, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: SAGE }}>Your counterpart</p>
                  <p style={{ fontFamily: FONT, margin: "3px 0 0", fontSize: 17, fontWeight: 700, color: WHITE }}>Ministry of Health Representative</p>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontFamily: FONT, fontSize: 13, color: SAGE, opacity: 0.85 }}>Exchange {exchangeCount} of ~10</span>
                <button style={btnOutlineSage} onClick={endMeeting} disabled={loading || transitioning}>End Meeting</button>
              </div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "1.5rem 2rem", display: "flex", flexDirection: "column", gap: 16, background: CHARCOAL_10 }}>
              {messages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 8 }}>
                  {msg.role === "assistant" && (
                    <div style={{ width: 30, height: 30, borderRadius: "50%", background: SAGE, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <i className="ti ti-building-community" style={{ fontSize: 14, color: CHARCOAL }} aria-hidden="true" />
                    </div>
                  )}
                  <div style={{
                    maxWidth: "74%", padding: "0.8rem 1.05rem",
                    borderRadius: msg.role === "user" ? "12px 12px 3px 12px" : "3px 12px 12px 12px",
                    background: msg.role === "user" ? ORANGE : WHITE,
                    border: msg.role === "user" ? "none" : `1px solid ${BORDER}`,
                    fontFamily: FONT, fontSize: 15, lineHeight: 1.7,
                    color: msg.role === "user" ? WHITE : CHARCOAL,
                    whiteSpace: "pre-wrap",
                  }}>
                    {msg.role === "assistant" ? renderMohMessage(msg.content) : msg.content}
                  </div>
                </div>
              ))}

              {loading && !transitioning && (
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                  <div style={{ width: 30, height: 30, borderRadius: "50%", background: SAGE, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <i className="ti ti-building-community" style={{ fontSize: 14, color: CHARCOAL }} aria-hidden="true" />
                  </div>
                  <div style={{ padding: "0.8rem 1.05rem", background: WHITE, border: `1px solid ${BORDER}`, borderRadius: "3px 12px 12px 12px", display: "flex", gap: 5, alignItems: "center" }}>
                    {[0,1,2].map(d => (
                      <div key={d} style={{ width: 7, height: 7, borderRadius: "50%", background: SAGE, animation: "blink 1.2s ease-in-out infinite", animationDelay: `${d * 0.22}s` }} />
                    ))}
                  </div>
                </div>
              )}

              {exchangeCount >= 9 && !loading && !transitioning && (
                <div style={{ textAlign: "center", padding: "0.6rem 1rem", background: ORANGE_PALE, borderRadius: 8, fontFamily: FONT, fontSize: 13, color: ORANGE_DARK, border: `1px solid ${ORANGE}` }}>
                  The meeting is approaching its natural conclusion. Consider wrapping up or click End Meeting.
                </div>
              )}

              {transitioning && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "1.25rem", background: SAGE_PALE, borderRadius: 8, border: `1px solid ${SAGE}` }}>
                  <p style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: SAGE_DARK, margin: 0 }}>The meeting has ended.</p>
                  <button
                    style={{ fontFamily: FONT, background: SAGE_DARK, color: WHITE, border: "none", borderRadius: 8, padding: "0.65rem 1.5rem", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}
                    onClick={() => { setTransitioning(false); setScreen("debrief"); }}
                  >
                    <i className="ti ti-clipboard-check" aria-hidden="true" />
                    View your debrief
                  </button>
                </div>
              )}

              <div ref={bottomRef} />
            </div>

            <div style={{ borderTop: `1px solid ${BORDER}`, padding: "1rem 2rem", background: WHITE, flexShrink: 0 }}>
              <div style={{ display: "flex", gap: 8 }}>
                <textarea
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                  placeholder="Type your response… (Enter to send, Shift+Enter for a new line)"
                  disabled={loading || transitioning}
                  rows={5}
                  style={{
                    flex: 1, resize: "none", fontFamily: FONT,
                    border: `1px solid ${BORDER_MED}`, borderRadius: 8,
                    padding: "0.65rem 0.9rem", fontSize: 15, lineHeight: 1.55,
                    color: CHARCOAL, background: WHITE, outline: "none",
                    minHeight: 120, maxHeight: 240,
                  }}
                />
                <button
                  style={{ ...btnPrimary, opacity: loading || transitioning || !input.trim() ? 0.4 : 1 }}
                  onClick={sendMessage}
                  disabled={loading || transitioning || !input.trim()}
                >
                  <i className="ti ti-send" aria-hidden="true" />
                  Send
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      // ── Screen 3: Debrief ───────────────────────────────────────────────────
      if (screen === "debrief") {
        const d = debrief;
        return (
          <div style={pageWrap}>
            <h2 className="sr-only">Meeting Debrief</h2>
            <div style={cardWrap}>
              <div style={cardHdr}>
                <Avatar icon="clipboard-check" bg={ORANGE} />
                <div>
                  <p style={{ fontFamily: FONT, margin: 0, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: SAGE }}>Meeting complete</p>
                  <p style={{ fontFamily: FONT, margin: "3px 0 0", fontSize: 18, fontWeight: 700, color: WHITE }}>Your Debrief</p>
                </div>
              </div>

              <div style={cardBody}>
                {!d || (!d.overall && !d.workedWell.length && !d.couldBeStronger.length) ? (
                  <>
                    <p style={{ fontFamily: FONT, fontSize: 15, color: CHARCOAL, marginBottom: "1rem" }}>
                      The meeting has ended. Here is the raw feedback from this session:
                    </p>
                    {d?._raw && (
                      <pre style={{ fontFamily: FONT, fontSize: 14, lineHeight: 1.7, color: CHARCOAL, whiteSpace: "pre-wrap", background: CHARCOAL_10, borderRadius: 8, padding: "1rem", margin: 0 }}>
                        {d._raw}
                      </pre>
                    )}
                  </>
                ) : (
                  <>
                    <SectionLabel>Overall impression</SectionLabel>
                    <div style={{ background: SAGE_PALE, borderLeft: `3px solid ${SAGE_DARK}`, borderRadius: 8, padding: "1.25rem 1.5rem", marginBottom: "2rem" }}>
                      <p style={{ fontFamily: FONT, margin: 0, fontSize: 16, lineHeight: 1.8, color: CHARCOAL, fontWeight: 500 }}>{d.overall}</p>
                    </div>

                    {d.workedWell.length > 0 && (
                      <div style={{ marginBottom: "1.75rem" }}>
                        <SectionLabel>What worked well</SectionLabel>
                        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                          {d.workedWell.map((item, i) => (
                            <div key={i} style={{ display: "flex", gap: 12, background: "#F0F8F5", borderRadius: 8, padding: "0.9rem 1.1rem" }}>
                              <i className="ti ti-circle-check" style={{ color: SUCCESS, fontSize: 18, flexShrink: 0, marginTop: 1 }} aria-hidden="true" />
                              <p style={{ fontFamily: FONT, margin: 0, fontSize: 15, lineHeight: 1.7, color: CHARCOAL }}>{item}</p>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {d.couldBeStronger.length > 0 && (
                      <div style={{ marginBottom: "1.75rem" }}>
                        <SectionLabel>What could be stronger</SectionLabel>
                        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                          {d.couldBeStronger.map((item, i) => (
                            <div key={i} style={{ display: "flex", gap: 12, background: ORANGE_PALE, borderRadius: 8, padding: "0.9rem 1.1rem" }}>
                              <i className="ti ti-alert-circle" style={{ color: WARN, fontSize: 18, flexShrink: 0, marginTop: 1 }} aria-hidden="true" />
                              <p style={{ fontFamily: FONT, margin: 0, fontSize: 15, lineHeight: 1.7, color: CHARCOAL }}>{item}</p>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {d.oneThing && (
                      <>
                        <Divider />
                        <SectionLabel>One thing to try differently next time</SectionLabel>
                        <div style={{ background: CHARCOAL, borderRadius: 8, padding: "1.1rem 1.4rem" }}>
                          <p style={{ fontFamily: FONT, margin: 0, fontSize: 15, lineHeight: 1.8, color: WHITE }}>{d.oneThing}</p>
                        </div>
                      </>
                    )}
                  </>
                )}

                <Divider />
                <button style={btnPrimary} onClick={reset}>
                  <i className="ti ti-refresh" aria-hidden="true" />
                  Try Again
                </button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ─── Mount ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
