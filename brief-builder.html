<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Brief Builder — The Fred Hollows Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #F2F2F2; font-family: 'Noto Sans', 'Segoe UI', sans-serif; }
    @keyframes blink { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── Design tokens ─────────────────────────────────────────────────────────
    const ORANGE      = "#EA7600";
    const ORANGE_PALE = "#FEF3E6";
    const ORANGE_DARK = "#B85D00";
    const SAGE        = "#A5C8BE";
    const SAGE_DARK   = "#4E8C80";
    const SAGE_PALE   = "#EBF5F3";
    const CHARCOAL    = "#282828";
    const CHARCOAL_60 = "#717171";
    const CHARCOAL_10 = "#F2F2F2";
    const WHITE       = "#FFFFFF";
    const BORDER      = "rgba(40,40,40,0.13)";
    const BORDER_MED  = "rgba(40,40,40,0.24)";
    const SUCCESS     = "#2E7D5E";
    const FONT        = "'Noto Sans', 'Segoe UI', sans-serif";

    const pageWrap       = { minHeight: "100vh", background: CHARCOAL_10, fontFamily: FONT, padding: "2rem 1rem" };
    const cardWrap       = { maxWidth: 760, margin: "0 auto", background: WHITE, borderRadius: 14, border: `1px solid ${BORDER}`, overflow: "hidden" };
    const cardHdr        = { background: CHARCOAL, padding: "1.25rem 2rem", display: "flex", alignItems: "center", gap: 14 };
    const cardBody       = { padding: "2rem" };
    const btnPrimary     = { fontFamily: FONT, background: ORANGE, color: WHITE, border: "none", borderRadius: 8, padding: "0.7rem 1.5rem", fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 };
    const btnDisabled    = { ...btnPrimary, background: CHARCOAL_10, color: CHARCOAL_60, border: `1px solid ${BORDER}`, cursor: "not-allowed" };
    const btnOutlineSage = { fontFamily: FONT, background: "transparent", color: SAGE, border: `1.5px solid ${SAGE}`, borderRadius: 8, padding: "0.45rem 1.1rem", fontSize: 14, fontWeight: 600, cursor: "pointer" };
    const btnSuccess     = { fontFamily: FONT, background: SUCCESS, color: WHITE, border: "none", borderRadius: 8, padding: "0.65rem 1.5rem", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 };
    const btnSage        = { fontFamily: FONT, background: SAGE_PALE, color: SAGE_DARK, border: `1.5px solid ${SAGE}`, borderRadius: 8, padding: "0.7rem 1.5rem", fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 };
    const btnSageDark    = { fontFamily: FONT, background: SAGE_DARK, color: WHITE, border: "none", borderRadius: 8, padding: "0.65rem 1.5rem", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 };

    // ── Step indicator ────────────────────────────────────────────────────────
    const STEPS = ["Core message", "Refine message", "Your context", "Build brief"];

    function StepBar({ current }) {
      return (
        <div style={{ display: "flex", alignItems: "center", padding: "0.9rem 2rem", borderBottom: `1px solid ${BORDER}`, background: WHITE, gap: 0 }}>
          {STEPS.map((label, i) => {
            const done    = i < current;
            const active  = i === current;
            const future  = i > current;
            return (
              <React.Fragment key={i}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, flexShrink: 0 }}>
                  <div style={{
                    width: 26, height: 26, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 700, fontFamily: FONT,
                    background: done ? SAGE_DARK : active ? ORANGE : CHARCOAL_10,
                    color: done || active ? WHITE : CHARCOAL_60,
                    border: future ? `1.5px solid ${BORDER_MED}` : "none",
                  }}>
                    {done ? <i className="ti ti-check" style={{ fontSize: 13 }} /> : i + 1}
                  </div>
                  <span style={{ fontFamily: FONT, fontSize: 13, fontWeight: active ? 700 : 400, color: active ? CHARCOAL : done ? SAGE_DARK : CHARCOAL_60, whiteSpace: "nowrap" }}>{label}</span>
                </div>
                {i < STEPS.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: done ? SAGE_DARK : BORDER, margin: "0 10px", minWidth: 16 }} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    // ── Shared sub-components ─────────────────────────────────────────────────
    function Avatar({ icon, bg, size = 38 }) {
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <i className={`ti ti-${icon}`} style={{ color: WHITE, fontSize: size * 0.47 }} />
        </div>
      );
    }

    function SectionLabel({ children }) {
      return <p style={{ fontFamily: FONT, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: CHARCOAL_60, margin: "0 0 10px" }}>{children}</p>;
    }

    function Divider() {
      return <hr style={{ border: "none", borderTop: `1px solid ${BORDER}`, margin: "1.5rem 0" }} />;
    }

    function FormField({ label, hint, value, onChange, rows = 3, placeholder, optional = false }) {
      return (
        <div style={{ marginBottom: "1.25rem" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 5 }}>
            <label style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: CHARCOAL }}>{label}</label>
            {optional && <span style={{ fontFamily: FONT, fontSize: 12, color: CHARCOAL_60, fontStyle: "italic" }}>Optional</span>}
          </div>
          {hint && <p style={{ fontFamily: FONT, fontSize: 13, color: CHARCOAL_60, margin: "0 0 7px", lineHeight: 1.55 }}>{hint}</p>}
          <textarea
            value={value}
            onChange={e => onChange(e.target.value)}
            rows={rows}
            placeholder={placeholder}
            style={{ width: "100%", fontFamily: FONT, fontSize: 14, lineHeight: 1.6, border: `1px solid ${BORDER_MED}`, borderRadius: 8, padding: "0.65rem 0.9rem", color: CHARCOAL, background: WHITE, outline: "none", resize: "vertical" }}
          />
        </div>
      );
    }

    function renderMessageContent(text, isUser = false) {
      const lines = (text || "").split("\n");
      return lines.map((line, i) => {
        if (!line.trim()) return <div key={i} style={{ height: 8 }} />;
        const html = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        if (!isUser && line.match(/^[-•]\s/)) {
          return (
            <div key={i} style={{ display: "flex", gap: 8, lineHeight: 1.7, marginBottom: 2 }}>
              <span style={{ flexShrink: 0, marginTop: 2 }}>•</span>
              <span dangerouslySetInnerHTML={{ __html: html.replace(/^[-•]\s/, "") }} />
            </div>
          );
        }
        if (!isUser && line.match(/^\d+\.\s/)) {
          return <div key={i} style={{ lineHeight: 1.7, marginBottom: 2 }} dangerouslySetInnerHTML={{ __html: html }} />;
        }
        return <div key={i} style={{ lineHeight: 1.7 }} dangerouslySetInnerHTML={{ __html: html }} />;
      });
    }

    function TypingIndicator() {
      return (
        <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: SAGE, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <i className="ti ti-robot" style={{ fontSize: 14, color: CHARCOAL }} />
          </div>
          <div style={{ padding: "0.8rem 1.05rem", background: WHITE, border: `1px solid ${BORDER}`, borderRadius: "3px 12px 12px 12px", display: "flex", gap: 5, alignItems: "center" }}>
            {[0,1,2].map(d => <div key={d} style={{ width: 7, height: 7, borderRadius: "50%", background: SAGE, animation: "blink 1.2s ease-in-out infinite", animationDelay: `${d*0.22}s` }} />)}
          </div>
        </div>
      );
    }

    function ErrorBanner({ message, onDismiss }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "0.75rem 1rem", background: "#FAE9E6", borderRadius: 8, border: "1px solid #E8A090", fontFamily: FONT, fontSize: 14, color: "#7A2818" }}>
          <i className="ti ti-alert-triangle" style={{ fontSize: 16, flexShrink: 0 }} />
          <span>{message}</span>
          <button onClick={onDismiss} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 13, color: "#7A2818", textDecoration: "underline" }}>Dismiss</button>
        </div>
      );
    }

    function ChatBubble({ msg }) {
      const isUser = msg.role === "user";
      return (
        <div className="fade-in" style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 8 }}>
          {!isUser && (
            <div style={{ width: 30, height: 30, borderRadius: "50%", background: SAGE, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginBottom: 2 }}>
              <i className="ti ti-robot" style={{ fontSize: 14, color: CHARCOAL }} />
            </div>
          )}
          <div style={{
            maxWidth: isUser ? "72%" : "84%",
            padding: "0.85rem 1.1rem",
            borderRadius: isUser ? "12px 12px 3px 12px" : "3px 12px 12px 12px",
            background: isUser ? ORANGE : WHITE,
            border: isUser ? "none" : `1px solid ${BORDER}`,
            fontFamily: FONT, fontSize: 15, lineHeight: 1.7,
            color: isUser ? WHITE : CHARCOAL,
          }}>
            {renderMessageContent(msg.content.replace(/BRIEF_COMPLETE\s*/g, "").replace(/REFINEMENT_READY\s*/g, ""), isUser)}
          </div>
        </div>
      );
    }

    function ChatInput({ value, onChange, onSend, loading, placeholder = "Type your response… (Enter to send, Shift+Enter for new line)" }) {
      return (
        <div style={{ borderTop: `1px solid ${BORDER}`, padding: "1rem 2rem", background: WHITE, flexShrink: 0 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <textarea
              value={value}
              onChange={e => onChange(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); } }}
              placeholder={placeholder}
              disabled={loading}
              rows={4}
              style={{ flex: 1, resize: "none", fontFamily: FONT, border: `1px solid ${BORDER_MED}`, borderRadius: 8, padding: "0.65rem 0.9rem", fontSize: 15, lineHeight: 1.55, color: CHARCOAL, background: WHITE, outline: "none", minHeight: 100, maxHeight: 200 }}
            />
            <button style={{ ...btnPrimary, opacity: loading || !value.trim() ? 0.4 : 1 }} onClick={onSend} disabled={loading || !value.trim()}>
              <i className="ti ti-send" />
              Send
            </button>
          </div>
        </div>
      );
    }

    // ── System prompts ────────────────────────────────────────────────────────
    function buildRefineSystemPrompt(cm) {
      return `You are an assistant helping a participant from The Fred Hollows Foundation refine their core advocacy message before they develop a policy brief.

The participant has submitted this draft core message:
PROBLEM: ${cm.problem}
CAUSE: ${cm.cause}
SOLUTION: ${cm.solution}
ADVOCACY ASK: ${cm.ask}
DECISION MAKER: ${cm.decisionMaker}

Your role is to help them improve this message by:
1. Checking whether all key components are present: Problem, Cause, Solution, Advocacy Ask, and a clear Decision Maker.
2. Offering constructive feedback on clarity, persuasiveness and structure — is it clear, compelling, and specific? Does it use plain language? Is the ask concrete and actionable?
3. Suggesting improvements if any component is missing, too vague, too long, overly technical, or lacks a clear ask.
4. Where helpful, suggest a reworded version or prompt the participant to clarify certain elements.

Once you are satisfied the core message is strong — all components present, clear ask, plain language, specific enough to be useful — say exactly this signal on its own line so the interface can detect it: REFINEMENT_READY
Then follow it with a brief encouraging closing line.

Important guidance:
- Use a warm, professional tone. Be concise, supportive, and practical.
- Use Australian English spelling.
- Do not be harsh — this is a learning context. But do not accept a weak message without pushing for improvement.
- Keep your responses concise — this is a coaching conversation, not a lecture.
- Never ask more than two questions or make more than two suggestions at a time.
- The message does not need to be perfect — it needs to be good enough to build a brief from. Once it is there, signal REFINEMENT_READY and move on.`;
    }

    function buildBriefSystemPrompt(cm, ctx) {
      return `You are a friendly, encouraging coaching tool helping staff from The Fred Hollows Foundation (FHF) develop an advocacy policy brief.

The user has completed their core message and provided context. Your role is to draft a professional policy brief and then guide refinement.

CORE MESSAGE:
Problem: ${cm.problem}
Cause: ${cm.cause}
Solution: ${cm.solution}
Advocacy Ask: ${cm.ask}
Decision Maker: ${cm.decisionMaker}

CONTEXT PROVIDED BY USER:
Decision maker priorities: ${ctx.dmPriorities || "Not provided"}
Likely objections: ${ctx.objections || "Not provided"}
Local data/statistics: ${ctx.localData || "Not provided"}
Evidence the solution works: ${ctx.evidence || "Not provided"}
Existing plans/systems to connect to: ${ctx.existingPlans || "Not provided"}
Cost and benefit information: ${ctx.costBenefit || "Not provided"}
FHF's offer of support: ${ctx.fhfRole || "Not provided"}

Your tone throughout should be that of a knowledgeable, encouraging colleague. Keep your language simple and direct. Users may not be writing in their first language.

---

STAGE 1: DRAFT BRIEF

Begin immediately by producing the full policy brief. Do not ask questions first. Use **bold** markers for all section headings.

Use this Vietnam example as a benchmark for tone, specificity, and how recommendations are written:

EXAMPLE:
**A National Cataract Surgical Protocol to Strengthen Cataract Surgical Quality in Vietnam**

**Executive Summary**
- Vietnam's cataract surgical quality falls significantly below WHO benchmarks, with only 60% good outcomes vs the 80% target
- The absence of national standards and outcomes monitoring is driving inequitable, avoidable complications
- A government-endorsed National Protocol for Cataract Surgery (NPCS) would standardise practice and embed quality monitoring
- Evidence from Vietnam shows routine outcomes monitoring can rapidly improve results
- FHF urges MSA to lead development, piloting and national rollout of the NPCS

**The Problem**
Cataract surgery is one of the most cost-effective health interventions. However in Vietnam, only 60% of surgeries result in a good visual outcome — well below the WHO benchmark of 80% or more. There are no national, government-endorsed standards for cataract surgical procedures, minimum quality requirements, or routine monitoring of post-operative outcomes.

**Why It Matters**
Poor outcomes lead to significant long-term social and economic burdens. Improving surgical quality is a cost-effective investment that protects health system resources and quality of life, and directly supports Vietnam's commitments on Universal Health Coverage and avoidable blindness reduction.

**The Solution**
An MOH-endorsed National Protocol for Cataract Surgery (NPCS) would standardise clinical practice and minimum quality standards. Evidence shows this works: Tien Giang Provincial Eye Hospital improved good outcomes from 67% to 82% in two years by following a Cataract Surgical Surveillance System supported by FHF.

**Cost, Feasibility & Impact**
MSA is well positioned to lead this process. It aligns with MSA's existing role in setting technical standards and its experience developing clinical practice guidelines for cataract. FHF stands ready to provide evidence, technical assistance, and support for piloting.

**Policy Recommendations**
1. Endorse and lead a national process to develop a National Protocol for Cataract Surgery (NPCS).
2. Convene a technical working group to draft the NPCS and define minimum quality requirements.
3. Embed cataract surgical outcomes monitoring within the NPCS.
4. Pilot the NPCS for 6 months in selected provinces/facilities before national rollout.
5. Link NPCS compliance to facility accreditation and health insurance reimbursement criteria.

**Contact**
The Fred Hollows Foundation
[Contact name and details]

END OF EXAMPLE

Now draft the user's brief using exactly this structure:

**[Title]**
Short, specific, solution-focused.

**Executive Summary**
3–5 bullet points: the problem and scale, why it matters to this decision maker, the proposed solution, 2–3 headline recommendations.

**The Problem**
1–2 short paragraphs. Lead with local data if available. Establish urgency without being overwhelming.

**Why It Matters**
Connect to what this decision maker cares about — their priorities, pressures and existing commitments.

**The Solution**
Describe the proposed intervention with evidence it works.

**Cost, Feasibility & Impact**
Address feasibility directly. Reference existing systems or budget lines where possible.

**Policy Recommendations**
3–5 numbered, specific, actionable recommendations. Use active verbs: endorse, convene, allocate, integrate, pilot, establish.

**Contact**
The Fred Hollows Foundation
[Note to user: add your name and contact details here]

IMPORTANT: Never invent facts, statistics or examples. Where specific information is missing, use placeholders — but make them specific and actionable, not generic. Good placeholders name exactly what is needed and prompt the user to fill it in, for example:
- [Add the number of people affected or on waiting lists in your province here]
- [Name the specific districts or areas you want to target here]
- [Add the name of the relevant national health plan or UHC framework here]
- [Insert the cost per cataract surgery in your context if known]
Avoid vague placeholders like [Insert country example if available] or [Add data here] — these don't help the user know what to find. If you cannot write a specific placeholder, write the sentence without the data point rather than leaving a vague gap.

After producing the draft, say: "Please read through the draft carefully. When you're ready, click 'Start refinement' to strengthen it with my help."

---

STAGE 2: FEEDBACK AND REFINEMENT

When the user clicks "Start refinement", present ALL FIVE questions together in a single message. Do not ask them one at a time. Frame it like this:

"Take a careful look through the draft and answer as many of these as you can — you don't need to respond to all of them. I'll then produce a single revised version incorporating all your feedback.

1. ACCURACY: Are there any facts, figures, or claims that don't accurately reflect your country context? For example — correct names of ministries or departments, local terminology, how your health system is organised.

2. THE ASK: Read through the recommendations. Could your decision maker read each one and know exactly what they are being asked to do? Are any too vague, too ambitious, or not realistic given their actual authority?

3. DECISION MAKER FIT: Does the 'Why It Matters' section speak to what your decision maker actually cares about? Is there anything about their specific priorities or constraints that the draft misses?

4. FHF'S ROLE: Is the description of what FHF can offer accurate and realistic given your project? Anything overstated or missing?

5. OVERALL: Is there anything important missing from the brief? Or anything that could be cut to make the argument sharper?

Answer what you can in one response and I'll revise the whole brief at once."

When the user responds, incorporate ALL their feedback into a single complete revised brief. Do not show partial updates or section-by-section changes. Produce the full revised brief in one go.

After the revised brief, ask: "Does this look right, or is there anything else you'd like to adjust?"

If the user requests further changes, incorporate them and produce another complete revised brief.

When the user is satisfied, output exactly this signal on its own line: BRIEF_COMPLETE
Then immediately reproduce the complete final brief one more time so it can be downloaded.`;
    }

    function extractBriefText(messages) {
      for (let i = messages.length - 1; i >= 0; i--) {
        const m = messages[i];
        if (m.role === "assistant" && (m.content.match(/\*\*/g) || []).length >= 8) {
          return m.content.replace(/BRIEF_COMPLETE\s*/g, "").replace(/REFINEMENT_READY\s*/g, "").trim();
        }
      }
      return null;
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("core-message"); // core-message | refine | context | chat
      const [cm, setCm]         = useState({ problem: "", cause: "", solution: "", ask: "", decisionMaker: "" });
      const [ctx, setCtx]       = useState({ dmPriorities: "", objections: "", localData: "", evidence: "", existingPlans: "", costBenefit: "", fhfRole: "" });
      const [refineMessages, setRefineMessages] = useState([]);
      const [briefMessages,  setBriefMessages]  = useState([]);
      const [refineInput, setRefineInput] = useState("");
      const [briefInput,  setBriefInput]  = useState("");
      const [loading,     setLoading]     = useState(false);
      const [apiError,    setApiError]    = useState(null);
      const [refinementReady,  setRefinementReady]  = useState(false);
      const [showRefineBtn,    setShowRefineBtn]    = useState(false);
      const [refineStarted,    setRefineStarted]    = useState(false);
      const [briefComplete,    setBriefComplete]    = useState(false);
      const refineBottom = useRef(null);
      const briefBottom  = useRef(null);

      useEffect(() => { refineBottom.current?.scrollIntoView({ behavior: "smooth" }); }, [refineMessages, loading, screen === "refine"]);
      useEffect(() => { briefBottom.current?.scrollIntoView({ behavior: "smooth" }); }, [briefMessages, loading, screen === "chat"]);

      const cmValid = cm.problem.trim() && cm.cause.trim() && cm.solution.trim() && cm.ask.trim() && cm.decisionMaker.trim();

      async function callProxy(system, messages, maxTokens = 1400) {
        const res = await fetch("/api/brief-proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ system, messages, maxTokens }),
        });
        if (!res.ok) throw new Error(`Request failed (${res.status}). Please try again.`);
        const data = await res.json();
        if (!data.text) throw new Error("No response received. Please try again.");
        return data.text;
      }

      // ── Screen 2: Start refine chat ─────────────────────────────────────────
      async function startRefine() {
        setScreen("refine");
        setLoading(true);
        setApiError(null);
        try {
          const text = await callProxy(
            buildRefineSystemPrompt(cm),
            [{ role: "user", content: "Please review my core message and give me feedback." }]
          );
          setRefineMessages([{ role: "assistant", content: text }]);
          if (text.includes("REFINEMENT_READY")) setRefinementReady(true);
        } catch (err) { setApiError(err.message); }
        setLoading(false);
      }

      // ── Screen 2: Send refine message ───────────────────────────────────────
      async function sendRefine() {
        const userMsg = refineInput.trim();
        if (!userMsg || loading) return;
        setRefineInput("");
        const updated = [...refineMessages, { role: "user", content: userMsg }];
        setRefineMessages(updated);
        setLoading(true);
        setApiError(null);
        try {
          const apiMsgs = [{ role: "user", content: "Please review my core message and give me feedback." }, ...updated];
          const text = await callProxy(buildRefineSystemPrompt(cm), apiMsgs);
          setRefineMessages([...updated, { role: "assistant", content: text }]);
          if (text.includes("REFINEMENT_READY")) setRefinementReady(true);
        } catch (err) { setApiError(err.message); }
        setLoading(false);
      }

      // ── Screen 4: Start brief draft ─────────────────────────────────────────
      async function startBrief() {
        setScreen("chat");
        setLoading(true);
        setApiError(null);
        try {
          const text = await callProxy(
            buildBriefSystemPrompt(cm, ctx),
            [{ role: "user", content: "Please draft my policy brief now." }],
            2500
          );
          setBriefMessages([{ role: "assistant", content: text }]);
          const headerCount = (text.match(/\*\*/g) || []).length;
          if (headerCount >= 8) setShowRefineBtn(true);
          if (text.includes("BRIEF_COMPLETE")) setBriefComplete(true);
        } catch (err) { setApiError(err.message); }
        setLoading(false);
      }

      // ── Screen 4: Send brief message ────────────────────────────────────────
      async function sendBrief(override) {
        const userMsg = (override || briefInput).trim();
        if (!userMsg || loading) return;
        setBriefInput("");
        setShowRefineBtn(false);
        const updated = [...briefMessages, { role: "user", content: userMsg }];
        setBriefMessages(updated);
        setLoading(true);
        setApiError(null);
        try {
          const apiMsgs = [{ role: "user", content: "Please draft my policy brief now." }, ...updated];
          const maxTok  = 2500; // all responses may produce a full brief
          const text    = await callProxy(buildBriefSystemPrompt(cm, ctx), apiMsgs, maxTok);
          const newMsgs = [...updated, { role: "assistant", content: text }];
          setBriefMessages(newMsgs);
          const headerCount = (text.match(/\*\*/g) || []).length;
          if (headerCount >= 8 && !text.includes("BRIEF_COMPLETE")) setShowRefineBtn(true);
          if (text.includes("BRIEF_COMPLETE")) setBriefComplete(true);
        } catch (err) { setApiError(err.message); }
        setLoading(false);
      }

      function downloadBrief() {
        const brief = extractBriefText(briefMessages);
        if (!brief) return;
        const clean = brief.replace(/\*\*/g, "").trim();
        const blob  = new Blob([clean], { type: "text/plain" });
        const url   = URL.createObjectURL(blob);
        const a     = document.createElement("a");
        a.href = url; a.download = "policy-brief.txt"; a.click();
        URL.revokeObjectURL(url);
      }

      function reset() {
        setScreen("core-message");
        setCm({ problem: "", cause: "", solution: "", ask: "", decisionMaker: "" });
        setCtx({ dmPriorities: "", objections: "", localData: "", evidence: "", existingPlans: "", costBenefit: "", fhfRole: "" });
        setRefineMessages([]); setBriefMessages([]);
        setRefineInput(""); setBriefInput("");
        setLoading(false); setApiError(null);
        setRefinementReady(false); setShowRefineBtn(false); setRefineStarted(false); setBriefComplete(false);
      }

      const stepIndex = { "core-message": 0, "refine": 1, "context": 2, "chat": 3 }[screen];

      // ── Shared header ─────────────────────────────────────────────────────
      function Header({ subtitle }) {
        return (
          <div style={{ ...cardHdr, justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar icon="file-description" bg={ORANGE} />
              <div>
                <p style={{ fontFamily: FONT, margin: 0, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: SAGE }}>Unit 6 — Advocacy Tactics</p>
                <p style={{ fontFamily: FONT, margin: "3px 0 0", fontSize: 17, fontWeight: 700, color: WHITE }}>Policy Brief Builder</p>
              </div>
            </div>
            {screen !== "core-message" && <button style={btnOutlineSage} onClick={reset}>Start over</button>}
          </div>
        );
      }

      // ════════════════════════════════════════════════════════════════════════
      // SCREEN 1: Core message entry
      // ════════════════════════════════════════════════════════════════════════
      if (screen === "core-message") return (
        <div style={pageWrap}>
          <div style={cardWrap}>
            <Header />
            <StepBar current={0} />
            <div style={cardBody}>
              <SectionLabel>Step 1 of 4</SectionLabel>
              <h2 style={{ fontFamily: FONT, fontSize: 22, fontWeight: 700, color: CHARCOAL, margin: "0 0 0.75rem" }}>Your Core Message</h2>
              <p style={{ fontFamily: FONT, fontSize: 15, lineHeight: 1.75, color: CHARCOAL, margin: "0 0 1.5rem" }}>
                Enter the core advocacy message you developed in Unit 5. All fields are required — don't worry about perfecting them here, you'll have a chance to refine them in the next step.
              </p>
              <div style={{ background: SAGE_PALE, borderLeft: `3px solid ${SAGE_DARK}`, borderRadius: 8, padding: "1rem 1.25rem", marginBottom: "1.75rem" }}>
                <p style={{ fontFamily: FONT, margin: 0, fontSize: 14, color: CHARCOAL, lineHeight: 1.7 }}>
                  <strong>Tip:</strong> You can copy these directly from your Unit 5 activity. The next screen will help you sharpen them before building the brief.
                </p>
              </div>
              <FormField label="Problem" hint="What is the issue you are trying to address, and why does it matter?" value={cm.problem} onChange={v => setCm(p => ({...p, problem: v}))} placeholder="e.g. In our province, thousands of people are living with avoidable blindness from cataracts because services are not reaching them." rows={3} />
              <FormField label="Cause" hint="What underlying factors or gaps are contributing to the problem?" value={cm.cause} onChange={v => setCm(p => ({...p, cause: v}))} placeholder="e.g. There are no outreach services in rural districts, and surgical capacity is concentrated in the provincial hospital." rows={3} />
              <FormField label="Solution" hint="What needs to change to address the problem effectively?" value={cm.solution} onChange={v => setCm(p => ({...p, solution: v}))} placeholder="e.g. The province should fund and roll out community-based cataract outreach to identify and refer patients in rural areas." rows={3} />
              <FormField label="Advocacy ask" hint="What specific action do you want the decision maker to take?" value={cm.ask} onChange={v => setCm(p => ({...p, ask: v}))} placeholder="e.g. We are asking the Provincial Health Director to include funding for cataract outreach in next year's provincial health plan." rows={2} />
              <Divider />
              <FormField label="Decision maker" hint="Who is this brief aimed at? Include their title and institution." value={cm.decisionMaker} onChange={v => setCm(p => ({...p, decisionMaker: v}))} placeholder="e.g. Provincial Health Director, Kampong Cham Province" rows={2} />
              <button style={cmValid ? btnPrimary : btnDisabled} disabled={!cmValid} onClick={startRefine}>
                <i className="ti ti-arrow-right" />
                Continue to message refinement
              </button>
            </div>
          </div>
        </div>
      );

      // ════════════════════════════════════════════════════════════════════════
      // SCREEN 2: Refine core message (chat)
      // ════════════════════════════════════════════════════════════════════════
      if (screen === "refine") return (
        <div style={pageWrap}>
          <div style={{ ...cardWrap, display: "flex", flexDirection: "column", minHeight: "88vh" }}>
            <Header />
            <StepBar current={1} />
            <div style={{ background: ORANGE_PALE, borderBottom: `1px solid ${BORDER}`, padding: "0.85rem 2rem", flexShrink: 0 }}>
              <p style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: ORANGE_DARK, margin: "0 0 2px" }}>Step 2 — Refine your core message</p>
              <p style={{ fontFamily: FONT, fontSize: 13, color: CHARCOAL, margin: 0, lineHeight: 1.55 }}>Review the AI's feedback and make any improvements before building your brief. When your message is strong, you'll be able to continue to the next step.</p>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "1.5rem 2rem", display: "flex", flexDirection: "column", gap: 16, background: CHARCOAL_10 }}>
              {refineMessages.map((msg, i) => <ChatBubble key={i} msg={msg} />)}
              {loading && <TypingIndicator />}
              {apiError && <ErrorBanner message={apiError} onDismiss={() => setApiError(null)} />}
              {refinementReady && !loading && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, padding: "1.25rem", background: SAGE_PALE, borderRadius: 8, border: `1px solid ${SAGE}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <i className="ti ti-circle-check" style={{ color: SAGE_DARK, fontSize: 20 }} />
                    <p style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: SAGE_DARK, margin: 0 }}>Your core message is ready — continue to the next step.</p>
                  </div>
                  <button style={btnPrimary} onClick={() => setScreen("context")}>
                    <i className="ti ti-arrow-right" />
                    Continue to context questions
                  </button>
                </div>
              )}
              <div ref={refineBottom} />
            </div>
            {!refinementReady && (
              <ChatInput value={refineInput} onChange={setRefineInput} onSend={sendRefine} loading={loading} />
            )}
          </div>
        </div>
      );

      // ════════════════════════════════════════════════════════════════════════
      // SCREEN 3: Context questions (form)
      // ════════════════════════════════════════════════════════════════════════
      if (screen === "context") return (
        <div style={pageWrap}>
          <div style={cardWrap}>
            <Header />
            <StepBar current={2} />
            <div style={cardBody}>
              <SectionLabel>Step 3 of 4</SectionLabel>
              <h2 style={{ fontFamily: FONT, fontSize: 22, fontWeight: 700, color: CHARCOAL, margin: "0 0 0.75rem" }}>Your Context</h2>
              <p style={{ fontFamily: FONT, fontSize: 15, lineHeight: 1.75, color: CHARCOAL, margin: "0 0 0.5rem" }}>
                This information will help make your brief specific and compelling. Share as much or as little as you have — all fields are optional.
              </p>
              <p style={{ fontFamily: FONT, fontSize: 14, lineHeight: 1.7, color: CHARCOAL_60, margin: "0 0 1.75rem" }}>
                You know your context better than the AI does. Even rough notes or best guesses are more useful than leaving a field blank.
              </p>

              <SectionLabel>About your decision maker</SectionLabel>
              <FormField
                label="What do you think they care most about right now?"
                hint="e.g. budget pressures, UHC targets, service quality, political visibility — your best guess is fine"
                value={ctx.dmPriorities} onChange={v => setCtx(p => ({...p, dmPriorities: v}))}
                placeholder="e.g. The Provincial Health Director is under pressure to show improved service delivery indicators across the province, and is particularly focused on reducing preventable conditions."
                rows={3} optional />
              <FormField
                label="What objections or concerns might they raise?"
                hint="e.g. cost, competing priorities, workforce capacity — don't worry if you're not certain"
                value={ctx.objections} onChange={v => setCtx(p => ({...p, objections: v}))}
                placeholder="e.g. They may question whether there is budget available, and whether district hospitals have enough staff to take on more surgical load."
                rows={3} optional />

              <Divider />
              <SectionLabel>Evidence and examples</SectionLabel>
              <FormField
                label="Do you have any local data or statistics on the scale of the problem?"
                hint="Even approximate figures, waiting list estimates, or data from a neighbouring region are useful"
                value={ctx.localData} onChange={v => setCtx(p => ({...p, localData: v}))}
                placeholder="e.g. District health staff estimate there are 200–300 people in the province awaiting cataract surgery. National data suggests X% of people aged 50+ have untreated cataract."
                rows={3} optional />
              <FormField
                label="Is there an example that shows your proposed solution could work?"
                hint="A pilot result, success story from your project, or a comparable country example"
                value={ctx.evidence} onChange={v => setCtx(p => ({...p, evidence: v}))}
                placeholder="e.g. A cataract outreach pilot in one district last year identified and referred 45 patients for surgery. A similar approach in neighbouring country X achieved..."
                rows={3} optional />

              <Divider />
              <SectionLabel>Feasibility</SectionLabel>
              <FormField
                label="Are there existing plans, strategies or budget lines your proposal could connect to?"
                hint="e.g. annual health planning cycles, UHC frameworks, NCD strategies, eye health plans"
                value={ctx.existingPlans} onChange={v => setCtx(p => ({...p, existingPlans: v}))}
                placeholder="e.g. The province has an annual health planning process where districts submit priorities. There may be scope to include cataract outreach within the existing primary health care budget."
                rows={3} optional />
              <FormField
                label="Any sense of the cost involved and the likely benefit or return?"
                hint="Doesn't need to be precise — even a general sense of cost-effectiveness is helpful"
                value={ctx.costBenefit} onChange={v => setCtx(p => ({...p, costBenefit: v}))}
                placeholder="e.g. Cataract surgery is widely recognised as one of the most cost-effective health interventions. The main costs would be outreach transport, staff time, and consumables for surgery."
                rows={3} optional />

              <Divider />
              <SectionLabel>FHF's role</SectionLabel>
              <FormField
                label="What can The Fred Hollows Foundation realistically offer?"
                hint="e.g. technical assistance, evidence gathering, stakeholder coordination, piloting support, funding"
                value={ctx.fhfRole} onChange={v => setCtx(p => ({...p, fhfRole: v}))}
                placeholder="e.g. FHF can provide technical support, help coordinate with district health teams, assist with a pilot outreach activity, and support collection of basic data on unmet need."
                rows={3} optional />

              <div style={{ display: "flex", gap: 12, marginTop: "0.5rem" }}>
                <button style={btnSage} onClick={() => setScreen("refine")}>
                  <i className="ti ti-arrow-left" />
                  Back
                </button>
                <button style={btnPrimary} onClick={startBrief}>
                  <i className="ti ti-file-text" />
                  Build my brief
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      // ════════════════════════════════════════════════════════════════════════
      // SCREEN 4: Draft and refine (chat)
      // ════════════════════════════════════════════════════════════════════════
      if (screen === "chat") return (
        <div style={pageWrap}>
          <div style={{ ...cardWrap, display: "flex", flexDirection: "column", minHeight: "88vh" }}>
            <Header />
            <StepBar current={3} />
            <div style={{ background: ORANGE_PALE, borderBottom: `1px solid ${BORDER}`, padding: "0.7rem 2rem", flexShrink: 0 }}>
              <span style={{ fontFamily: FONT, fontSize: 12, fontWeight: 700, color: ORANGE_DARK, textTransform: "uppercase", letterSpacing: "0.08em", marginRight: 8 }}>Decision maker:</span>
              <span style={{ fontFamily: FONT, fontSize: 13, color: CHARCOAL }}>{cm.decisionMaker}</span>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "1.5rem 2rem", display: "flex", flexDirection: "column", gap: 16, background: CHARCOAL_10 }}>
              {briefMessages.map((msg, i) => <ChatBubble key={i} msg={msg} />)}
              {loading && <TypingIndicator />}
              {apiError && <ErrorBanner message={apiError} onDismiss={() => setApiError(null)} />}
              {showRefineBtn && !refineStarted && !loading && !briefComplete && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, padding: "1.25rem", background: SAGE_PALE, borderRadius: 8, border: `1px solid ${SAGE}` }}>
                  <p style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: SAGE_DARK, margin: 0 }}>Take a moment to read through the draft, then click below to start the refinement questions.</p>
                  <button style={btnSageDark} onClick={() => { setRefineStarted(true); sendBrief("I have read the draft and I am ready to refine it."); }}>
                    <i className="ti ti-edit" />
                    Start refinement
                  </button>
                </div>
              )}
              {briefComplete && !loading && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, padding: "1.25rem", background: "#F0F8F5", borderRadius: 8, border: `1px solid ${SUCCESS}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <i className="ti ti-circle-check" style={{ color: SUCCESS, fontSize: 22 }} />
                    <p style={{ fontFamily: FONT, fontSize: 15, fontWeight: 600, color: SUCCESS, margin: 0 }}>Your brief is complete</p>
                  </div>
                  <button style={btnSuccess} onClick={downloadBrief}>
                    <i className="ti ti-download" />
                    Download your brief
                  </button>
                </div>
              )}
              <div ref={briefBottom} />
            </div>
            {!briefComplete ? (
              <ChatInput value={briefInput} onChange={setBriefInput} onSend={() => sendBrief()} loading={loading} />
            ) : (
              <div style={{ borderTop: `1px solid ${BORDER}`, padding: "1rem 2rem", background: WHITE, flexShrink: 0, display: "flex", gap: 10 }}>
                <button style={btnSage} onClick={reset}>
                  <i className="ti ti-refresh" />
                  Start a new brief
                </button>
                <button style={btnPrimary} onClick={downloadBrief}>
                  <i className="ti ti-download" />
                  Download brief
                </button>
              </div>
            )}
          </div>
        </div>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
